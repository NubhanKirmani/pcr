<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphic Multi-Burst Police Lights</title>
    <style>
        /* --- CORE GRAPHIC ENVIRONMENT --- */
        body {
            background-color: #030308;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- 3D METALLIC LIGHTBAR HOUSING --- */
        .lightbar {
            display: flex;
            width: 95%;
            max-width: 850px;
            height: 160px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border: 5px solid #334155;
            border-radius: 24px;
            padding: 10px;
            gap: 6px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.8),
                inset 0 4px 8px rgba(255,255,255,0.1);
        }

        /* --- HIGH GRADIENT GLASS SECTIONS --- */
        .light {
            flex: 1;
            height: 100%;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Internal realistic vertical reflective linear lens lines */
        .light::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent 50%, rgba(0,0,0,0.15) 50%);
            background-size: 6px 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* High-intensity glowing inner core bulb graphic */
        .light::after {
            content: '';
            position: absolute;
            width: 35%;
            height: 35%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(6px);
            z-index: 2;
        }

        /* Static base translucent states (Always visible) */
        .red { background: linear-gradient(180deg, #600 0%, #300 100%); border: 1px solid rgba(255,0,0,0.1); }
        .blue { background: linear-gradient(180deg, #005 0%, #002 100%); border: 1px solid rgba(0,0,255,0.1); }
        .white-center { background: linear-gradient(180deg, #222 0%, #111 100%); flex: 0.4; border: 1px solid rgba(255,255,255,0.05); }

        /* --- CONTROLS HUD --- */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 700;
            background-color: #0f172a;
            color: #94a3b8;
            border: 2px solid #1e293b;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #1e293b;
            color: white;
            transform: translateY(-2px);
        }

        button.active {
            background-color: white;
            color: #0f172a;
            border-color: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* --- MODE 1: ALTERNATING BURST KEYFRAMES --- */
        .mode-alt .red { animation: tripleAltRed 1.2s infinite linear; }
        .mode-alt .white-red-side { animation: centerAltRed 1.2s infinite linear; }
        
        .mode-alt .blue { animation: tripleAltBlue 1.2s infinite linear; }
        .mode-alt .white-blue-side { animation: centerAltBlue 1.2s infinite linear; }

        /* Red side colored lenses */
        @keyframes tripleAltRed {
            0%, 10%, 20%, 30%, 100% { background: linear-gradient(180deg, #600 0%, #300 100%); box-shadow: none; }
            5%, 15%, 25% { background: #ff003c; box-shadow: 0 0 50px 15px #ff003c, inset 0 0 15px #fff; }
        }
        /* Left white lens (follows red timing) */
        @keyframes centerAltRed {
            0%, 10%, 20%, 30%, 100% { background: linear-gradient(180deg, #222 0%, #111 100%); box-shadow: none; }
            5%, 15%, 25% { background: #ffffff; box-shadow: 0 0 45px 15px #ffffff; }
        }

        /* Blue side colored lenses */
        @keyframes tripleAltBlue {
            0%, 50%, 60%, 70., 80%, 100% { background: linear-gradient(180deg, #005 0%, #002 100%); box-shadow: none; }
            55%, 65%, 75% { background: #0055ff; box-shadow: 0 0 50px 15px #0055ff, inset 0 0 15px #fff; }
        }
        /* Right white lens (follows blue timing) */
        @keyframes centerAltBlue {
            0%, 50%, 60%, 70%, 80%, 100% { background: linear-gradient(180deg, #222 0%, #111 100%); box-shadow: none; }
            55%, 65%, 75% { background: #ffffff; box-shadow: 0 0 45px 15px #ffffff; }
        }

        /* --- MODE 2: SYNCHRONIZED BURST KEYFRAMES --- */
        .mode-sync .red { animation: tripleSyncRed 0.8s infinite linear; }
        .mode-sync .white-red-side { animation: tripleSyncRed 0.8s infinite linear; }
        
        .mode-sync .blue { animation: tripleSyncBlue 0.8s infinite linear; }
        .mode-sync .white-blue-side { animation: tripleSyncBlue 0.8s infinite linear; }

        @keyframes tripleSyncRed {
            0%, 12%, 24%, 36%, 100% { background: linear-gradient(180deg, #600 0%, #300 100%); box-shadow: none; }
            6%, 18%, 30% { background: #ff003c; box-shadow: 0 0 50px 15px #ff003c, inset 0 0 15px #fff; }
        }

        @keyframes tripleSyncBlue {
            0%, 12%, 24%, 36%, 100% { background: linear-gradient(180deg, #005 0%, #002 100%); box-shadow: none; }
            6%, 18%, 30% { background: #0055ff; box-shadow: 0 0 50px 15px #0055ff, inset 0 0 15px #fff; }
        }
    </style>
</head>
<body class="mode-alt">

    <!-- 3D Metallic Lightbar Structure -->
    <div class="lightbar">
        <!-- Left Red Sections -->
        <div class="light red"></div>
        <div class="light red"></div>
        
        <!-- Two White Center Modules (Separated Sides) -->
        <div class="light white-center white-red-side"></div>
        <div class="light white-center white-blue-side"></div>
        
        <!-- Right Blue Sections -->
        <div class="light blue"></div>
        <div class="light blue"></div>
    </div>

    <!-- UI Selection HUD Deck -->
    <div class="controls">
        <button class="active" onclick="changeMode(this, 'mode-alt')">Alternating Flashes</button>
        <button onclick="changeMode(this, 'mode-sync')">Sync Flashes</button>
    </div>

    <script>
        function changeMode(btn, modeName) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.body.className = modeName;
        }
    </script>

</body>
</html>
